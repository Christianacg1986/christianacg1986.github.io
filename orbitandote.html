<!DOCTYPE html>
<html>
<head>
    <style>
        /* Estilo del modal (pop-up) */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; }
        #player { background: #000; }
    </style>
</head>
<body>

    <button id="openModal">Reproducir Canción</button>

    <div id="modal">
        <div id="player"></div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let player;
        const botToken = "TU_TOKEN_AQUI";
        const chatId = "TU_CHAT_ID_AQUI";

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '390', width: '640', videoId: 'dhs1_PVAy8k'
            });
        }

        document.getElementById('openModal').addEventListener('click', function() {
            // Muestra el modal
            document.getElementById('modal').style.display = 'flex';
            
            // Inicia el video
            player.playVideo();
            
            // Envía la notificación a Telegram
            fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=¡Alguien abrió el pop-up de Orbitándote!`);
        });
    </script>
</body>
</html>
