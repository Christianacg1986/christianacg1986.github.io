<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Orbitándote - Christian Alexander</title>
    <style>
        /* Estética Cósmica */
        body { 
            margin: 0; 
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%); 
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            font-family: 'Segoe UI', sans-serif; 
        }
        h1 { font-size: 3rem; margin-bottom: 30px; text-shadow: 0 0 20px #4e54c8; }
        
        #openModal { 
            padding: 20px 40px; 
            font-size: 1.5rem; 
            background: transparent; 
            border: 2px solid #4e54c8; 
            border-radius: 50px; 
            cursor: pointer; 
            color: white; 
            transition: 0.3s; 
            box-shadow: 0 0 15px #4e54c8; 
        }
        #openModal:hover { background: #4e54c8; transform: scale(1.05); }
        
        #modal { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); 
            justify-content: center; 
            align-items: center; 
            z-index: 1000;
        }
    </style>
</head>
<body>

    <h1>Orbitándote</h1>
    <button id="openModal">Reproducir Canción</button>

    <div id="modal">
        <iframe width="640" height="360" src="https://www.youtube.com/embed/dhs1_PVAy8k?autoplay=1" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>

    <script>
        // URL de tu Apps Script
        const scriptUrl = "https://script.google.com/macros/s/AKfycbzzEzdm3Ci544HABBsOPuIriy-NzB0nXCJR6ar5XoYAzFXBQcMmRY-9fZo3jifvFDLR/exec";

        document.getElementById('openModal').addEventListener('click', function() {
            // Mostrar el video
            document.getElementById('modal').style.display = 'flex';
            
            // Disparar la notificación al Google Sheet/Email
            fetch(scriptUrl, { mode: 'no-cors' }); 

            // Ocultar botón
            this.style.display = 'none';
        });
    </script>
</body>
</html>
