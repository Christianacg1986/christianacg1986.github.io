<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Orbitándote</title>
    <style>
        body { margin: 0; background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%); color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; }
        #openModal { padding: 20px 40px; font-size: 1.5rem; background: #4e54c8; color: white; border: none; border-radius: 50px; cursor: pointer; box-shadow: 0 0 20px #4e54c8; }
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); justify-content: center; align-items: center; }
    </style>
</head>
<body>

    <h1>Orbitándote</h1>
    <button id="openModal">Reproducir Canción</button>

    <div id="modal">
        <iframe id="video" width="640" height="360" src="https://www.youtube.com/embed/dhs1_PVAy8k?autoplay=1" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>

    <script>
        const scriptUrl = "https://script.google.com/macros/s/AKfycbwv7ntklSt7Zy1iXftSX-GQmwTxB87UoF_apW3P6jBI9VkSuCH8C4rTCSYr2Gt96rCS/exec";

        document.getElementById('openModal').addEventListener('click', function() {
            // Mostrar modal
            document.getElementById('modal').style.display = 'flex';
            
            // Notificación (se ejecuta en segundo plano)
            fetch(scriptUrl, { method: 'POST', mode: 'no-cors' })
            .catch(err => console.log("Notificación enviada"));

            // Ocultar botón
            this.style.display = 'none';
        });
    </script>
</body>
</html>
